<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Bomb Pass</title>
    <link rel="icon" href="favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <canvas id="game"></canvas>
    <div id="menu">
      <img id="b2" class="btn" src="images/button-2-players.png" /><img
        id="b3"
        class="btn"
        src="images/button-3-players.png"
      /><img id="b4" class="btn" src="images/button-4-players.png" />
    </div>
    <div id="settings">
      <div class="settings-content-wrapper">
        <div class="settings-content">
          <label for="timeInput" style="font-size:0.7em;">Game Time (seconds):</label><br />
          <input
            id="timeInput"
            type="number"
            min="5"
            max="300"
            value="60"
            style="margin-bottom:32px;"
          /><br />
          <img id="startBtn" class="btn" src="images/start.png" />
          <img id="backBtn" class="btn" src="images/restart.png" />
        </div>
      </div>
    </div>
    <div id="ui">
      <div id="timer"></div>
      <div id="winner"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
